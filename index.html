<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Babaluu Kiosk</title>
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body { width:100vw; height:100vh; overflow:hidden; background:#000; font-family:'Segoe UI', sans-serif; }

        .slideshow { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
        .slide { position:absolute; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; opacity:0; transition:opacity 1s ease; }
        .slide.active { opacity:1; }

        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; pointer-events:none; }
        .overlay > * { pointer-events:auto; }

        .logo { position:absolute; top:20px; left:20px; width:60px; height:60px; border-radius:50%; background:#e94560; color:#fff; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:bold; cursor:pointer; z-index:20; }
        .top-right { position:absolute; top:20px; right:20px; display:flex; gap:15px; align-items:center; color:#fff; font-size:18px; text-shadow:1px 1px 3px rgba(0,0,0,0.8); }
        .clock { font-size:24px; font-weight:bold; }
        .weather { display:flex; align-items:center; gap:5px; }

        .lang-bar { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); display:flex; gap:10px; z-index:15; }
        .flag { width:40px; height:30px; border-radius:5px; cursor:pointer; background-size:cover; border:2px solid white; opacity:0.8; transition:0.2s; }
        .flag:hover, .flag.active { opacity:1; border-color:#e94560; }

        .side-buttons { position:absolute; left:20px; bottom:120px; display:flex; flex-direction:column; gap:10px; }
        .side-btn { background:rgba(0,0,0,0.7); color:#fff; padding:12px 20px; border-radius:25px; font-size:18px; cursor:pointer; border:2px solid transparent; text-align:center; }
        .side-btn:active { border-color:#e94560; }

        .menu-btn { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:#e94560; color:#fff; padding:18px 40px; border-radius:50px; font-size:24px; font-weight:bold; cursor:pointer; border:none; }

        /* Admin modal */
        .admin-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:none; overflow-y:auto; }
        .admin-overlay.active { display:block; }
        .admin-panel { max-width:800px; margin:30px auto; background:#1a1a2e; border-radius:25px; padding:30px; color:#fff; }
        .admin-panel h2 { color:#e94560; margin-bottom:20px; }
        .admin-panel input, .admin-panel textarea { width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid #333; background:#2a2a40; color:#fff; font-size:16px; }
        .admin-panel button { padding:12px 24px; margin:5px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; font-size:16px; }
        .btn-save { background:#28a745; color:#fff; }
        .btn-del { background:#dc3545; color:#fff; }
        .btn-add { background:#17a2b8; color:#fff; }
        .admin-close { position:absolute; top:15px; right:20px; background:#e94560; color:#fff; width:40px; height:40px; border-radius:50%; border:none; font-size:20px; cursor:pointer; }

        .pin-dialog { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:200; display:none; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
        .pin-dialog.active { display:flex; }
        .pin-input { font-size:36px; text-align:center; width:180px; padding:12px; border-radius:12px; border:2px solid #e94560; background:#1a1a2e; color:#fff; letter-spacing:8px; }
        .pin-btn { padding:14px 30px; font-size:20px; border-radius:12px; background:#e94560; color:#fff; border:none; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

<!-- Slideshow -->
<div class="slideshow" id="slideshow"></div>

<!-- Overlay -->
<div class="overlay">
    <div class="logo" id="logo">B</div>
    <div class="top-right">
        <div class="clock" id="clock">00:00</div>
        <div class="weather" id="weather">--°C</div>
    </div>

    <div class="lang-bar" id="langBar">
        <div class="flag active" style="background-image:url('https://flagcdn.com/w40/me.png')" data-lang="cg"></div>
        <div class="flag" style="background-image:url('https://flagcdn.com/w40/gb.png')" data-lang="en"></div>
        <div class="flag" style="background-image:url('https://flagcdn.com/w40/ru.png')" data-lang="ru"></div>
        <div class="flag" style="background-image:url('https://flagcdn.com/w40/de.png')" data-lang="de"></div>
        <div class="flag" style="background-image:url('https://flagcdn.com/w40/it.png')" data-lang="it"></div>
        <div class="flag" style="background-image:url('https://flagcdn.com/w40/tr.png')" data-lang="tr"></div>
    </div>

    <div class="side-buttons" id="sideButtons"></div>

    <button class="menu-btn" id="menuButton" onclick="openMenu()">🍽 Pritisni za meni</button>
</div>

<!-- Admin panel -->
<div class="admin-overlay" id="adminOverlay">
    <button class="admin-close" onclick="closeAdmin()">✕</button>
    <div class="admin-panel">
        <h2>🔧 Admin Panel - Podešavanja Kioska</h2>

        <h3>🖼️ Slideshow slike (jedan URL po redu)</h3>
        <div id="slidesList"></div>
        <button class="btn-add" onclick="addSlideField()">+ Dodaj sliku</button>

        <h3>⏱️ Brzina smenjivanja slika (sekunde)</h3>
        <input type="number" id="slideSpeed" value="4" min="1" max="30">

        <h3>📋 Kockice (dugmad)</h3>
        <div id="buttonsList"></div>
        <button class="btn-add" onclick="addButtonField()">+ Dodaj kockicu</button>

        <h3>🍽️ Link za meni</h3>
        <input type="text" id="menuLink" value="https://www.babaluu.me/me/jelovnik">

        <h3>🔒 PIN za izlazak</h3>
        <input type="text" id="pinCode" value="0987" maxlength="4">

        <br><br>
        <button class="btn-save" onclick="saveSettings()">💾 Sačuvaj sve</button>
    </div>
</div>

<!-- PIN dijalog -->
<div class="pin-dialog" id="pinDialog">
    <div style="color:#fff;font-size:22px;">🔒 Unesite PIN za izlazak</div>
    <input type="password" class="pin-input" id="pinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*">
    <button class="pin-btn" onclick="checkPin()">Potvrdi</button>
    <button style="background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;" onclick="hidePinDialog()">Odustani</button>
</div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://itoyvqqssqmeyxawvulq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_nbUWlCIXbB48NoBRhH4ucg_PfCAmau1';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ==================== GLOBALNI PODACI ====================
let settings = {
    slideshow_images: [],
    slide_speed: 4,
    buttons: [],
    menu_link: 'https://www.babaluu.me/me/jelovnik',
    pin_code: '0987'
};
let currentSlide = 0;
let slideInterval = null;
let logoClicks = 0;

// ==================== UČITAVANJE IZ CLOUD‑A ====================
async function loadSettings() {
    const { data, error } = await supabase.from('kiosk_settings').select('*').eq('id', 1).single();
    if (data) {
        settings = {
            slideshow_images: data.slideshow_images || [],
            slide_speed: data.slide_speed || 4,
            buttons: data.buttons || [],
            menu_link: data.menu_link || 'https://www.babaluu.me/me/jelovnik',
            pin_code: data.pin_code || '0987'
        };
    }
    applySettings();
}

function applySettings() {
    // Slideshow
    const container = document.getElementById('slideshow');
    container.innerHTML = '';
    settings.slideshow_images.forEach(url => {
        const div = document.createElement('div');
        div.className = 'slide';
        div.style.backgroundImage = `url(${url})`;
        container.appendChild(div);
    });
    if (settings.slideshow_images.length > 0) {
        document.querySelectorAll('.slide')[0]?.classList.add('active');
        currentSlide = 0;
        if (slideInterval) clearInterval(slideInterval);
        slideInterval = setInterval(nextSlide, settings.slide_speed * 1000);
    }

    // Kockice
    const sideDiv = document.getElementById('sideButtons');
    sideDiv.innerHTML = '';
    settings.buttons.forEach(btn => {
        const b = document.createElement('button');
        b.className = 'side-btn';
        b.textContent = btn.icon + ' ' + btn.label_cg;
        b.onclick = () => {
            if (btn.link.startsWith('modal_')) {
                alert('Modal: ' + btn.label_cg);
            } else {
                window.open(btn.link, '_blank');
            }
        };
        sideDiv.appendChild(b);
    });

    // Meni dugme
    document.getElementById('menuButton').onclick = () => {
        window.open(settings.menu_link, '_blank');
    };

    // PIN
    document.getElementById('pinCode').value = settings.pin_code;
}

// ==================== SLIDESHOW ====================
function nextSlide() {
    const slides = document.querySelectorAll('.slide');
    if (slides.length === 0) return;
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
}

// ==================== SAT I VREME ====================
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('sr', {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

async function fetchWeather() {
    try {
        const res = await fetch('https://api.openweathermap.org/data/2.5/weather?q=Budva,ME&units=metric&appid=bd5e378503939ddaee76f1e1e4f8c4b2&lang=sr');
        const data = await res.json();
        if (data.main) {
            document.getElementById('weather').innerHTML = `🌤 ${Math.round(data.main.temp)}°C`;
        }
    } catch(e) {}
}
fetchWeather();
setInterval(fetchWeather, 600000);

// ==================== ADMIN ====================
document.getElementById('logo').addEventListener('click', () => {
    logoClicks++;
    if (logoClicks >= 5) {
        logoClicks = 0;
        openAdmin();
    }
    setTimeout(() => { logoClicks = 0; }, 2000);
});

function openAdmin() {
    document.getElementById('adminOverlay').classList.add('active');
    renderAdminForms();
}

function closeAdmin() {
    document.getElementById('adminOverlay').classList.remove('active');
}

function renderAdminForms() {
    // Slideshow
    const slidesDiv = document.getElementById('slidesList');
    slidesDiv.innerHTML = '';
    settings.slideshow_images.forEach((url, i) => {
        slidesDiv.innerHTML += `
            <div style="display:flex;gap:10px;margin:5px 0;">
                <input type="text" value="${url}" data-slide="${i}" style="flex:1;">
                <button class="btn-del" onclick="removeSlide(${i})">✕</button>
            </div>`;
    });
    document.getElementById('slideSpeed').value = settings.slide_speed;

    // Kockice
    const buttonsDiv = document.getElementById('buttonsList');
    buttonsDiv.innerHTML = '';
    settings.buttons.forEach((btn, i) => {
        buttonsDiv.innerHTML += `
            <div style="border:1px solid #333;padding:10px;margin:5px 0;border-radius:10px;">
                <input type="text" value="${btn.icon}" data-btn="${i}" data-field="icon" placeholder="Ikona (emoji)" style="width:60px;">
                <input type="text" value="${btn.label_cg}" data-btn="${i}" data-field="label_cg" placeholder="CG naziv">
                <input type="text" value="${btn.link}" data-btn="${i}" data-field="link" placeholder="Link">
                <button class="btn-del" onclick="removeButton(${i})">✕</button>
            </div>`;
    });

    document.getElementById('menuLink').value = settings.menu_link;
}

function addSlideField() {
    settings.slideshow_images.push('');
    renderAdminForms();
}

function removeSlide(i) {
    settings.slideshow_images.splice(i, 1);
    renderAdminForms();
}

function addButtonField() {
    settings.buttons.push({ icon: '📌', label_cg: 'Novo dugme', link: '#' });
    renderAdminForms();
}

function removeButton(i) {
    settings.buttons.splice(i, 1);
    renderAdminForms();
}

async function saveSettings() {
    // Pročitaj vrednosti iz input polja
    settings.slide_speed = parseInt(document.getElementById('slideSpeed').value) || 4;
    settings.menu_link = document.getElementById('menuLink').value;
    settings.pin_code = document.getElementById('pinCode').value || '0987';

    // Slides
    document.querySelectorAll('#slidesList input').forEach(inp => {
        const i = parseInt(inp.dataset.slide);
        settings.slideshow_images[i] = inp.value;
    });

    // Kockice
    document.querySelectorAll('#buttonsList input').forEach(inp => {
        const i = parseInt(inp.dataset.btn);
        const field = inp.dataset.field;
        settings.buttons[i][field] = inp.value;
    });

    // Sačuvaj u Supabase
    const { error } = await supabase.from('kiosk_settings').upsert({
        id: 1,
        slideshow_images: settings.slideshow_images,
        slide_speed: settings.slide_speed,
        buttons: settings.buttons,
        menu_link: settings.menu_link,
        pin_code: settings.pin_code
    });

    if (!error) {
        alert('✅ Sačuvano! Promene su aktivne.');
        applySettings();
        closeAdmin();
    } else {
        alert('❌ Greška pri čuvanju.');
    }
}

// ==================== PIN I KIOSK ====================
function showPinDialog() {
    document.getElementById('pinDialog').classList.add('active');
    document.getElementById('pinInput').value = '';
    setTimeout(() => document.getElementById('pinInput').focus(), 300);
}

function hidePinDialog() { document.getElementById('pinDialog').classList.remove('active'); }

function checkPin() {
    if (document.getElementById('pinInput').value === settings.pin_code) {
        hidePinDialog();
        if (document.fullscreenElement) document.exitFullscreen();
    } else {
        alert('Pogrešan PIN!');
        document.getElementById('pinInput').value = '';
    }
}

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if (['Escape','F11','Backspace','Alt','Meta'].includes(e.key)) e.preventDefault();
});
document.addEventListener('touchmove', e => { if(!e.target.closest('input')) e.preventDefault(); }, {passive: false});
window.addEventListener('load', () => {
    document.documentElement.requestFullscreen().catch(() => {});
    loadSettings();
});
</script>
</body>
</html>
